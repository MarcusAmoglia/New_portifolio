name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm install

      - name: Compilar Projeto (Build)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload da pasta dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Oficial
        id: deployment
        uses: actions/deploy-pages@v4
